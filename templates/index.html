<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>AI-Powered Pricing & Demand Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet" />

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  background-color: #0a1e3f;
  color: #f5f7fa;
}

.left {
  width: 55%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 50px;
}

.left h1 {
  font-size: 3rem;
}

.signature {
  margin-top: 35px;
  font-size: 1.8rem;
  color: #66ccff;
}

.college {
  font-size: 0.9rem;
  color: #7f8c8d;
}

.right {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 360px;
  padding: 40px;
  border-radius: 20px;
  background-color: #112b54;
  text-align: center;
}

.card h2 {
  color: #66ccff;
}

input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 10px;
  border: none;
  background: #0f234a;
  color: #fff;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 12px;
  border: none;
  background-color: #66ccff;
  font-weight: 600;
  cursor: pointer;
}

#result {
  margin-top: 15px;
  font-size: 1.1rem;
  color: #66ffcc;
}
</style>
</head>

<body>

<div class="left">
  <h1>AI-Powered Pricing & Demand Intelligence Platform</h1>
  <p>Forecast demand and optimize pricing using AI.</p>

  <div class="signature">Sonal Yaduvanshi</div>
  <div class="college">B.Tech CSE • PSIT Kanpur</div>
</div>

<div class="right">
  <div class="card">
    <h2>Revenue Prediction</h2>

    <!-- INPUTS -->
    <input type="number" id="month" placeholder="Enter Month (1-12)" />
    <input type="number" id="day" placeholder="Enter Day (1-31)" />

    <!-- BUTTON -->
    <button onclick="predictRevenue()">Predict Revenue</button>

    <!-- RESULT -->
    <p id="result"></p>

  </div>
</div>

<script>
async function predictRevenue() {
  const month = document.getElementById("month").value;
  const day = document.getElementById("day").value;

  console.log("Month:", month);
  console.log("Day:", day);

  try {
    const res = await fetch("http://localhost:5000/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ month: month, day: day })
    });

    const data = await res.json();

    console.log(data);

    document.getElementById("result").innerText =
      "Predicted Revenue: " + data.prediction;

  } catch (error) {
    console.error(error);
    document.getElementById("result").innerText =
      "Error getting prediction ❌";
  }
}
</script>

</body>
</html>
